<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Админка</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="container">
      <div class="header-row">
        <h1>Админка гостей</h1>
        <button id="logout-btn" type="button" class="ghost-btn">Выйти</button>
      </div>
      <p class="subtitle">Добавление, проверка и удаление гостей</p>

      <form id="guest-form" class="card">
        <label>
          Фамилия
          <input id="surname" name="surname" type="text" list="surname-suggestions" required />
        </label>
        <datalist id="surname-suggestions"></datalist>
        
        <label>
          Имя
          <input id="name" name="name" type="text" list="name-suggestions" required />
        </label>
        <datalist id="name-suggestions"></datalist>

        <label>
          Образовательная программа
          <input id="studyDirection" name="studyDirection" type="text" list="program-suggestions" required />
        </label>
        <datalist id="program-suggestions"></datalist>

        <label class="checkbox">
          <input id="visitedEvent" name="visitedEvent" type="checkbox" />
          Уже отметил проход
        </label>

        <div class="actions">
          <button id="add-btn" type="button">Добавить</button>
          <button id="check-btn" type="button">Проверить</button>
          <button id="delete-btn" type="button" class="danger-btn">Удалить</button>
        </div>
      </form>

      <section class="card">
        <div class="section-head">
          <h2>Импорт списков</h2>
        </div>

        <div class="import-grid">
          <label>
            Выпускники (.xls/.xlsx)
            <input id="students-file" type="file" accept=".xls,.xlsx" />
          </label>
          <button id="import-students-btn" type="button">Загрузить выпускников</button>

          <label>
            Преподаватели (.xls/.xlsx)
            <input id="teachers-file" type="file" accept=".xls,.xlsx" />
          </label>
          <button id="import-teachers-btn" type="button">Загрузить преподавателей</button>
        </div>

        <div class="danger-zone">
          <button id="delete-students-btn" type="button" class="danger-btn">Удалить всех студентов</button>
        </div>
      </section>

      <section class="card">
        <div class="section-head">
          <h2>Статистика гостей</h2>
          <button id="refresh-stats-btn" type="button" class="ghost-btn">Обновить</button>
        </div>

        <div class="filters">
          <label>
            Статус посещения
            <select id="filter-visited">
              <option value="all">Все</option>
              <option value="true">Пришли</option>
              <option value="false">Не пришли</option>
            </select>
          </label>

          <label>
            Образовательная программа
            <input
              id="filter-studyDirection"
              type="text"
              list="program-suggestions"
              placeholder="Все программы"
            />
          </label>
        </div>

        <div class="stats-block">
          <h3>Количество пришедших по направлениям</h3>
          <ul id="program-stats-list" class="stats-list"></ul>
        </div>

        <div class="table-wrap">
          <table class="guests-table">
            <thead>
              <tr>
                <th>#</th>
                <th>Имя</th>
                <th>Фамилия</th>
                <th>Направление</th>
                <th>Статус</th>
              </tr>
            </thead>
            <tbody id="guests-tbody"></tbody>
          </table>
        </div>
      </section>
    </main>

    <div id="toast-root" class="toast-root"></div>
    <script src="/admin.js" defer></script>
  </body>
</html>
