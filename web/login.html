<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Вход в админку</title>
    <style>
      :root {
        --bg: #f3f4f6;
        --card: #ffffff;
        --text: #111827;
        --muted: #6b7280;
        --border: #d1d5db;
        --error: #991b1b;
        --error-bg: #fee2e2;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: var(--bg);
        color: var(--text);
      }

      .wrap {
        min-height: 100dvh;
        display: grid;
        place-items: center;
        padding: 16px;
      }

      .card {
        width: min(420px, 100%);
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: 12px;
        padding: 16px;
        display: grid;
        gap: 12px;
      }

      h1 {
        margin: 0;
        font-size: 24px;
      }

      p {
        margin: 0;
        color: var(--muted);
      }

      label {
        display: grid;
        gap: 6px;
        font-size: 14px;
      }

      input {
        width: 100%;
        border: 1px solid var(--border);
        border-radius: 8px;
        padding: 10px 12px;
        font-size: 15px;
      }

      button {
        border: 0;
        border-radius: 8px;
        padding: 10px 12px;
        font-size: 15px;
        background: #111827;
        color: #fff;
        cursor: pointer;
      }

      button:disabled {
        opacity: 0.7;
        cursor: wait;
      }

      .toast-root {
        position: fixed;
        right: 12px;
        top: 12px;
        display: grid;
        gap: 8px;
        width: min(360px, calc(100% - 24px));
      }

      .toast {
        border-radius: 10px;
        padding: 10px 12px;
        font-size: 14px;
        color: var(--error);
        background: var(--error-bg);
        border: 1px solid #fca5a5;
      }
    </style>
  </head>
  <body>
    <main class="wrap">
      <form id="login-form" class="card">
        <h1>Вход в админку</h1>
        <p>Введите логин и пароль</p>

        <label>
          Логин
          <input id="login" type="text" required />
        </label>

        <label>
          Пароль
          <input id="password" type="password" required />
        </label>

        <button id="login-btn" type="submit">Войти</button>
      </form>
    </main>

    <div id="toast-root" class="toast-root"></div>
    <script src="/login.js" defer></script>
  </body>
</html>
