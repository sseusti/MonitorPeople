<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Входная группа</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="container">
      <div class="header-row">
        <h1>Входная группа</h1>
        <button id="logout-btn" type="button" class="ghost-btn">Выйти</button>
      </div>
      <p class="subtitle">Только проверка посещения гостя</p>

      <form id="check-form" class="card">
         <label>
          Фамилия
          <input id="surname" name="surname" type="text" list="surname-suggestions" required />
        </label>
        <datalist id="surname-suggestions"></datalist>
        
        <label>
          Имя
          <input id="name" name="name" type="text" list="name-suggestions" required />
        </label>
        <datalist id="name-suggestions"></datalist>

        <div class="actions single">
          <button id="check-btn" type="button">Проверить посещение</button>
        </div>
      </form>

      <section class="card recent-checkins-card">
        <h2>Недавно отмеченные</h2>
        <p class="subtitle-inline">Можно отменить в течение 1 минуты</p>
        <ul id="recent-checkins-list" class="recent-checkins-list"></ul>
      </section>
    </main>

    <div id="toast-root" class="toast-root"></div>
    <script src="/entrance.js" defer></script>
  </body>
</html>
